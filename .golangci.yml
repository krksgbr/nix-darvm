version: "2"

linters:
  default: none
  enable:
    - bodyclose
    - contextcheck
    - copyloopvar
    - errcheck
    - errorlint
    - exhaustruct
    - exhaustive
    - gosec
    - govet
    - ineffassign
    - intrange
    - makezero
    - misspell
    - modernize
    - nilnil
    - noctx
    - prealloc
    - protogetter
    - staticcheck
    - unconvert
    - unparam
    - unused
    - wastedassign
    - wrapcheck
  settings:
    exhaustruct:
      include:
        - github.com/unbody/darvm/netstack/internal/control\.(Request|NetConfig|StatusInfo)
