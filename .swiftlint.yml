line_length:
  warning: 120
  error: 120

opening_brace:
  ignore_multiline_statement_conditions: true
  ignore_multiline_function_signatures: true

file_types_order:
  order:
    - [main_type, supporting_type]
    - [extension, preview_provider, library_content_provider]

type_contents_order:
  order:
    - [case]
    - [type_alias, associated_type, subtype, type_property, instance_property, ib_inspectable, ib_outlet, initializer, type_method]
    - [view_life_cycle_method, ib_action, ib_segue_action, other_method, subscript]
    - [deinitializer]
