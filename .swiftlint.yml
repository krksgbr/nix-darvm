included:
  - host/Package.swift
  - host/Sources
  - host/Tests

excluded:
  - host/.build
  - build

only_rules:
  - array_init
  - contains_over_first_not_nil
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_range_nil_comparison
  - convenience_type
  - direct_return
  - discouraged_optional_boolean
  - cyclomatic_complexity
  - duplicate_imports
  - empty_count
  - empty_collection_literal
  - empty_string
  - empty_xctest_method
  - explicit_init
  - fatal_error_message
  - file_length
  - first_where
  - for_where
  - function_body_length
  - identifier_name
  - line_length
  - nesting
  - no_space_in_method_call
  - operator_usage_whitespace
  - prefer_condition_list
  - prefer_key_path
  - prefer_zero_over_explicit_init
  - reduce_into
  - redundant_discardable_let
  - redundant_nil_coalescing
  - return_value_from_void_function
  - shorthand_optional_binding
  - sorted_first_last
  - statement_position
  - sorted_imports
  - superfluous_else
  - trailing_newline
  - trailing_whitespace
  - toggle_bool
  - type_body_length
  - unneeded_parentheses_in_closure_argument
  - unused_optional_binding
  - unused_enumerated
  - yoda_condition

line_length:
  warning: 120
  error: 120
